<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GimlaTech AI Helper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d121f;
            --surface: #1a2235;
            --surface2: #222b42;
            --border: #2d3748;
            --accent: #38bdf8;
            --purple: #818cf8;
            --green: #25d366;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Card styles as buttons for better interaction */
        .card-btn {
            background-color: var(--surface);
            border: 2px solid var(--border);
            transition: all 0.2s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            border-radius: 1.25rem;
            width: 100%;
        }

        .card-btn:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            background-color: var(--surface2);
        }

        .card-btn:active {
            transform: scale(0.98);
        }

        .screen {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Fixed Footer - Only takes space of the button */
        .footer-nav {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 1000;
            pointer-events: none; /* Container doesn't block clicks */
            padding: 0 20px;
        }

        .whatsapp-btn {
            background-color: var(--green);
            color: white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.6);
            transition: all 0.2s ease;
            padding: 1rem 2rem;
            border-radius: 1rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            pointer-events: auto; /* Button itself does block/receive clicks */
            border: none;
            cursor: pointer;
            max-width: 500px;
            width: 100%;
        }

        .whatsapp-btn:hover {
            background-color: #1ebc57;
            transform: translateY(-2px);
        }

        .tag {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .tag.active {
            background: rgba(56, 189, 248, 0.15);
            border-color: var(--accent);
            color: var(--accent);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(129, 140, 248, 0.3);
            border-top-color: var(--purple);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .step-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid var(--border);
        }

        .step-dot.active { border-color: var(--accent); color: var(--accent); }
        .step-dot.done { background: var(--accent); border-color: var(--accent); color: #000; }
        .step-line { flex: 1; height: 2px; background: var(--border); }
    </style>
</head>
<body class="pb-32">

    <!-- Sticky Header -->
    <header class="w-full py-6 flex justify-center items-center gap-3 border-b border-gray-800 bg-[#0d121f]/90 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <span class="text-2xl font-black tracking-tighter">Gimla<span class="text-sky-400">Tech</span></span>
            <span class="bg-indigo-500/10 text-indigo-400 text-xs font-bold px-2 py-1 rounded-full border border-indigo-500/20 uppercase">AI Helper</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto w-full px-6 py-8 flex-grow">

        <!-- Screen 1: Device Selection -->
        <section id="screen-device" class="screen active">
            <h1 class="text-3xl font-extrabold mb-2 text-center">במה לעזור היום?</h1>
            <p class="text-gray-400 text-center mb-8 text-lg">בחר את סוג המכשיר שבו יש תקלה</p>
            
            <div class="flex items-center gap-2 mb-10 max-w-xs mx-auto">
                <div class="step-dot active">1</div>
                <div class="step-line"></div>
                <div class="step-dot">2</div>
                <div class="step-line"></div>
                <div class="step-dot">3</div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <button onclick="selectDevice('computer', 'מחשב')" class="card-btn">
                    <span class="text-5xl mb-3">🖥️</span>
                    <span class="text-lg font-bold">מחשב</span>
                    <span class="text-xs text-gray-500">PC / Laptop</span>
                </button>
                <button onclick="selectDevice('phone', 'טלפון')" class="card-btn">
                    <span class="text-5xl mb-3">📱</span>
                    <span class="text-lg font-bold">טלפון חכם</span>
                    <span class="text-xs text-gray-500">Android / iPhone</span>
                </button>
                <button onclick="selectDevice('tablet', 'טאבלט')" class="card-btn">
                    <span class="text-5xl mb-3">📟</span>
                    <span class="text-lg font-bold">טאבלט</span>
                    <span class="text-xs text-gray-500">iPad / Galaxy Tab</span>
                </button>
                <button onclick="selectDevice('peripheral', 'ציוד היקפי')" class="card-btn">
                    <span class="text-5xl mb-3">🖨️</span>
                    <span class="text-lg font-bold">ציוד היקפי</span>
                    <span class="text-xs text-gray-500">מדפסת / WiFi</span>
                </button>
            </div>
        </section>

        <!-- Screen 2: OS Selection -->
        <section id="screen-os" class="screen">
            <button class="flex items-center gap-2 text-sm text-gray-500 mb-6 hover:text-sky-400 transition-colors" onclick="goScreen('device')">
                <span>🏠 חזרה לבחירת מכשיר</span>
            </button>
            <h1 class="text-3xl font-extrabold mb-2 text-center">איזו מערכת הפעלה?</h1>
            
            <div class="flex items-center gap-2 mb-10 max-w-xs mx-auto">
                <div class="step-dot done">✓</div>
                <div class="step-line bg-sky-500"></div>
                <div class="step-dot active">2</div>
                <div class="step-line"></div>
                <div class="step-dot">3</div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="os-options"></div>
        </section>

        <!-- Screen 3: Search & Answers -->
        <section id="screen-search" class="screen">
            <div class="flex items-center gap-4 text-sm mb-6 flex-wrap bg-gray-800/20 p-3 rounded-xl border border-gray-800">
                <button onclick="goScreen('device')" class="text-gray-400 hover:text-white">🏠 מכשיר: <b id="bread-device" class="text-sky-400"></b></button>
                <span class="text-gray-700">|</span>
                <button onclick="goScreen('os')" class="text-gray-400 hover:text-white">💻 מערכת: <b id="bread-os" class="text-sky-400"></b></button>
            </div>

            <div class="relative mb-8">
                <input type="text" id="query-input" placeholder="תאר את הבעיה בפירוט..." 
                       class="search-input w-full p-5 pr-6 rounded-2xl text-lg font-medium shadow-2xl"
                       oninput="debouncedSearch()" onkeydown="if(event.key==='Enter') triggerAI()">
                <button onclick="triggerAI()" class="absolute left-3 top-3 bg-indigo-500 hover:bg-indigo-400 text-white font-bold py-2 px-6 rounded-xl transition-all shadow-lg">
                    🌐 שאל AI
                </button>
            </div>

            <div id="tags-container" class="flex flex-wrap gap-2 mb-8"></div>
            <div id="results-area" class="space-y-4"></div>

            <div id="answer-container" class="hidden mt-6 bg-[#1e293b] border border-indigo-500/30 rounded-3xl p-8 shadow-2xl">
                <div id="answer-content"></div>
            </div>
        </section>

    </main>

    <!-- Perfectly Centered Navigation/Support -->
    <nav class="footer-nav">
        <button onclick="openSupportWa()" class="whatsapp-btn">
            <span>סיוע מסיירת גימלאטק — 0505396068</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
        </button>
    </nav>

    <script>
        const apiKey = ""; 
        let state = { device: '', deviceLabel: '', os: '', osLabel: '', currentAnswer: null, activeTag: null };
        
        const OS_OPTIONS = {
            computer: [{ id: 'WIN', label: 'Windows', icon: '🪟' }, { id: 'MAC', label: 'Mac', icon: '🍎' }],
            phone: [{ id: 'AND', label: 'Android', icon: '🤖' }, { id: 'IOS', label: 'iPhone', icon: '🍎' }],
            tablet: [{ id: 'AND', label: 'Android', icon: '🤖' }, { id: 'IOS', label: 'iPad', icon: '🍎' }],
            peripheral: [{ id: 'PC', label: 'מחשב (Windows)', icon: '🖥️' }, { id: 'MOB', label: 'טלפון (Mobile)', icon: '📱' }]
        };

        const KB = [
            { id: 101, dev: ['AND', 'IOS'], cat: '⚙️ הגדרות', title: 'איך מגדילים את הכתב (גופן)?', steps: ['כנס להגדרות המכשיר', 'בחר ב"תצוגה" או "נגישות"', 'לחץ על "גודל טקסט" או "גופן"', 'גרור את הסמן ימינה עד שהכתב גדול מספיק'], tip: 'ב-iPhone אפשר גם להפעיל "כתב מודגש" באותו תפריט.' },
            { id: 102, dev: ['AND', 'IOS'], cat: '🎥 תקשורת', title: 'איך מצטרפים לשיחת זום (Zoom)?', steps: ['לחץ על הקישור שקיבלת בוואטסאפ', 'אם האפליקציה מותקנת, היא תיפתח', 'לחץ על "Join with Video"', 'חשוב: לחץ על WiFi or Cellular Data כדי להפעיל סאונד'], tip: 'לוודא תמיד שהאפליקציה מעודכנת לגרסה האחרונה.' },
            { id: 103, dev: ['AND', 'IOS'], cat: '📱 וואטסאפ', title: 'איך שולחים תמונה בוואטסאפ?', steps: ['כנס לשיחה עם האדם הרצוי', 'לחץ על סמל המהדק (אנדרואיד) או הפלוס (אייפון)', 'בחר ב"גלריה" או "ספריית תמונות"', 'בחר את התמונה ולחץ על חץ השליחה הירוק'], tip: 'אפשר לשלוח כמה תמונות יחד על ידי לחיצה ארוכה בגלריה.' },
            { id: 1, dev: ['WIN', 'MAC'], cat: '🌐 אינטרנט', title: 'אין חיבור לאינטרנט', steps: ['ודא שמתג ה-WiFi מופעל', 'נתק את הנתב מהחשמל ל-30 שניות וחבר שוב', 'בחר את הרשת הביתית והכנס סיסמה'], tip: 'לפעמים פשוט הפעלה מחדש של המחשב פותרת את הבעיה.' }
        ];

        function goScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('screen-' + id);
            if(target) target.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function selectDevice(id, label) {
            state.device = id;
            state.deviceLabel = label;
            document.getElementById('bread-device').innerText = label;
            
            const container = document.getElementById('os-options');
            if(container) {
                container.innerHTML = OS_OPTIONS[id].map(os => `
                    <button onclick="selectOS('${os.id}', '${os.label}')" class="card-btn gap-4">
                        <span class="text-5xl">${os.icon}</span>
                        <span class="text-xl font-bold">${os.label}</span>
                    </button>
                `).join('');
            }
            goScreen('os');
        }

        function selectOS(id, label) {
            state.os = id;
            state.osLabel = label;
            document.getElementById('bread-os').innerText = label;
            renderTags();
            searchKB('');
            goScreen('search');
        }

        function renderTags() {
            const container = document.getElementById('tags-container');
            if(!container) return;
            const relevantKB = KB.filter(item => item.dev.includes(state.os));
            const cats = [...new Set(relevantKB.map(k => k.cat))];
            container.innerHTML = cats.map(cat => `<button onclick="filterTag('${cat}')" class="tag ${state.activeTag === cat ? 'active' : ''}">${cat}</button>`).join('');
        }

        function filterTag(cat) {
            state.activeTag = state.activeTag === cat ? null : cat;
            renderTags();
            searchKB(document.getElementById('query-input').value);
        }

        let searchTimeout;
        function debouncedSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => searchKB(document.getElementById('query-input').value), 300);
        }

        function searchKB(q) {
            const resultsArea = document.getElementById('results-area');
            const answerContainer = document.getElementById('answer-container');
            if(!resultsArea || !answerContainer) return;
            
            answerContainer.classList.add('hidden');
            const filtered = KB.filter(item => 
                item.dev.includes(state.os) && 
                (item.title.toLowerCase().includes(q.toLowerCase()) || item.cat.toLowerCase().includes(q.toLowerCase())) && 
                (!state.activeTag || item.cat === state.activeTag)
            );
            
            resultsArea.innerHTML = filtered.map(item => `
                <button onclick='showAnswer(${JSON.stringify(item)})' class="card-btn flex-row justify-between items-center p-5">
                    <div class="text-right">
                        <span class="text-xs text-sky-400 font-bold uppercase tracking-widest">${item.cat}</span>
                        <h3 class="text-lg font-bold mt-1">${item.title}</h3>
                    </div>
                    <span class="text-gray-600">◀</span>
                </button>
            `).join('');
        }

        function showAnswer(item, isAI = false) {
            state.currentAnswer = item;
            const resultsArea = document.getElementById('results-area');
            const container = document.getElementById('answer-container');
            const content = document.getElementById('answer-content');
            
            if(resultsArea) resultsArea.innerHTML = '';
            if(container) container.classList.remove('hidden');
            
            const badge = isAI ? 
                `<span class="bg-indigo-500/20 text-indigo-400 text-xs font-bold px-2 py-1 rounded border border-indigo-500/20">🔍 מענה AI מורחב</span>` : 
                `<span class="bg-green-500/20 text-green-400 text-xs font-bold px-2 py-1 rounded border border-green-500/20">מענה מהמאגר</span>`;

            if(content) {
                content.innerHTML = `
                    <div class="flex items-center gap-2 mb-4">${badge}</div>
                    <h2 class="text-2xl font-black mb-6 text-right">${item.title}</h2>
                    <div class="space-y-4 mb-8 text-right">
                        ${item.steps.map((step, i) => `
                            <div class="flex gap-4 items-start flex-row-reverse">
                                <span class="flex-shrink-0 w-8 h-8 bg-sky-500 text-black font-bold rounded-full flex items-center justify-center">${i + 1}</span>
                                <p class="text-lg pt-1">${step}</p>
                            </div>
                        `).join('')}
                    </div>
                    <div class="bg-amber-500/10 border border-amber-500/20 rounded-2xl p-4 mb-8 text-right">
                        <p class="text-amber-400 text-sm">💡 <b>טיפ:</b> ${item.tip}</p>
                    </div>
                    
                    <button id="copy-btn" onclick="copyAnswer()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 shadow-lg transition-all">
                        📋 העתק תשובה ללוח
                    </button>
                `;
            }
            if(container) container.scrollIntoView({ behavior: 'smooth' });
        }

        async function fetchWithRetry(url, options, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return await response.json();
                } catch (e) {}
                await new Promise(res => setTimeout(res, delays[i]));
            }
            throw new Error("Failed");
        }

        async function triggerAI() {
            const query = document.getElementById('query-input').value;
            if (!query) return;

            const content = document.getElementById('answer-content');
            document.getElementById('answer-container').classList.remove('hidden');
            content.innerHTML = `<div class="flex flex-col items-center py-10 gap-4"><div class="spinner"></div><p class="text-indigo-300 font-bold">ה-AI מנתח ומכין פתרון ממאגרי התמיכה...</p></div>`;

            const prompt = `פתרון טכני לבעיה: ${query}. עבור מכשיר: ${state.deviceLabel} (${state.osLabel}). החזר JSON: {"title":"...","steps":["..."],"tip":"..."}`;

            try {
                const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        tools: [{ "google_search": {} }],
                        generationConfig: { responseMimeType: "application/json" }
                    }) 
                });
                
                let text = result.candidates?.[0]?.content?.parts?.[0]?.text || "";
                // Robust JSON extraction
                const match = text.match(/\{[\s\S]*\}/);
                if (match) {
                    showAnswer(JSON.parse(match[0]), true);
                } else {
                    throw new Error("Invalid JSON");
                }
            } catch (err) {
                content.innerHTML = `<div class="text-center py-8"><p class="text-red-400 font-bold">שגיאה בתקשורת עם ה-AI. נסה לנסח מחדש או לבדוק שוב בעוד רגע.</p><button onclick="triggerAI()" class="mt-4 text-sky-400 underline">נסה שוב</button></div>`;
            }
        }

        function copyAnswer() {
            const a = state.currentAnswer;
            if (!a) return;
            const text = `*פתרון עבור: ${a.title}*\n\n${a.steps.map((s, i) => `*${i + 1}.* ${s}`).join('\n')}\n\n💡 *טיפ:* ${a.tip}\n\n_נשלח מסיירת גימלאטק_`;
            
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const btn = document.getElementById('copy-btn');
            btn.innerHTML = "✅ התשובה הועתקה!";
            btn.classList.replace('bg-indigo-600', 'bg-green-600');
            setTimeout(() => { 
                btn.innerHTML = "📋 העתק תשובה ללוח"; 
                btn.classList.replace('bg-green-600', 'bg-indigo-600');
            }, 2000);
        }

        function openSupportWa() {
            window.open(`https://wa.me/972505396068?text=${encodeURIComponent("היי, אני מתנדב בגימלאטק וזקוק לעזרה נוספת...")}`, '_blank');
        }
    </script>
</body>
</html>
