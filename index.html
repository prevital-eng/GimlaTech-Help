<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GimlaTech AI Helper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d121f;
            --surface: #1a2235;
            --surface2: #222b42;
            --border: #2d3748;
            --accent: #38bdf8;
            --purple: #818cf8;
            --green: #25d366;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .card-btn {
            background-color: var(--surface);
            border: 2px solid var(--border);
            transition: all 0.2s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            border-radius: 1.25rem;
            width: 100%;
        }

        .card-btn:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            background-color: var(--surface2);
        }

        .search-input {
            background-color: #1a2235 !important;
            color: #ffffff !important;
            border: 2px solid var(--border);
            outline: none;
        }
        .search-input:focus { border-color: var(--accent); }

        .search-input::placeholder {
            color: #94a3b8 !important;
        }

        .screen {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer-nav {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 1000;
            pointer-events: none;
            padding: 0 20px;
        }

        .whatsapp-btn {
            background-color: var(--green);
            color: white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.6);
            transition: all 0.2s ease;
            padding: 1rem 2rem;
            border-radius: 1rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            pointer-events: auto;
            border: none;
            cursor: pointer;
            max-width: 500px;
            width: 100%;
            font-family: 'Heebo', sans-serif;
            font-size: 1rem;
        }

        .tag {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            transition: all 0.2s;
            cursor: pointer;
            font-family: 'Heebo', sans-serif;
            color: var(--text-muted);
        }

        .tag:hover { border-color: var(--accent); color: var(--accent); }

        .tag.active {
            background: rgba(56, 189, 248, 0.15);
            border-color: var(--accent);
            color: var(--accent);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(129, 140, 248, 0.3);
            border-top-color: var(--purple);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .ai-action-btn {
            background: rgba(129, 140, 248, 0.1);
            border: 1px solid rgba(129, 140, 248, 0.3);
            color: var(--purple);
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            cursor: pointer;
            font-family: 'Heebo', sans-serif;
        }

        .ai-action-btn:hover { background: rgba(129, 140, 248, 0.2); }

        /* Error toast */
        #error-toast {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            background: #7f1d1d; border: 1px solid #ef4444; color: #fca5a5;
            padding: 12px 24px; border-radius: 12px; font-weight: 600; font-size: 0.9rem;
            z-index: 9999; display: none; text-align: center; max-width: 90%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="pb-32">

<!-- Error Toast -->
<div id="error-toast"></div>

<header class="w-full py-6 flex justify-center items-center gap-3 border-b border-gray-800 bg-[#0d121f]/90 backdrop-blur-md sticky top-0 z-50">
    <div class="flex items-center gap-2">
        <span class="text-2xl font-black tracking-tighter text-white">Gimla<span class="text-sky-400">Tech</span></span>

<main class="max-w-4xl mx-auto w-full px-6 py-8 flex-grow">

            <div class="flex-1 h-1 bg-sky-500"></div>

<script>
// ===================== STATE =====================
let state = {
    device: '', deviceLabel: '',
    os: '', osLabel: '',
    currentAnswer: null,
    isLoading: false
};

// ===================== OS MAP =====================
const OS_OPTIONS = {
    computer:   [{ id:'WIN', label:'Windows', icon:'🪟', sub:'Windows 10 / 11' }, { id:'MAC', label:'Mac', icon:'🍎', sub:'macOS' }],
    phone:      [{ id:'AND', label:'Android', icon:'🤖', sub:'Samsung, Xiaomi...' }, { id:'IOS', label:'iPhone', icon:'🍎', sub:'iOS' }],
    tablet:     [{ id:'AND', label:'Android', icon:'🤖', sub:'Samsung, Lenovo...' }, { id:'IOS', label:'iPad', icon:'🍎', sub:'iPadOS' }],
    peripheral: [{ id:'PC', label:'מחובר למחשב', icon:'🖥️', sub:'Windows' }, { id:'MOB', label:'מחובר לטלפון', icon:'📱', sub:'Android / iOS' }]
};

// ===================== NAVIGATION =====================
function goScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const el = document.getElementById('screen-' + id);
    if (el) el.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    if (id !== 'search') closeAnswer();
}

function selectDevice(id, label) {
    state.device = id;
    state.deviceLabel = label;
    document.getElementById('bread-device').innerText = label;
    const c = document.getElementById('os-options');
    c.innerHTML = OS_OPTIONS[id].map(o => `
        <button onclick="selectOS('${o.id}','${o.label}')" class="card-btn gap-4">
            <span class="text-5xl">${o.icon}</span>
            <span class="text-xl font-bold text-white">${o.label}</span>
            <span class="text-xs text-gray-500">${o.sub||''}</span>
        </button>`).join('');
    goScreen('os');
}

function selectOS(id, label) {
    state.os = id;
    state.osLabel = label;
    document.getElementById('bread-os').innerText = label;
    document.getElementById('query-input').value = '';
    document.getElementById('results-area').innerHTML = '';
    document.getElementById('tags-container').innerHTML = '';
    closeAnswer();
    goScreen('search');
}

// ===================== SEARCH UI =====================
function onInputChange() {
    // No local KB — just clear results when input is empty
    const q = document.getElementById('query-input').value.trim();
    if (q.length === 0) {
        document.getElementById('results-area').innerHTML = '';
        closeAnswer();
    }
}

function performSearch() {
    // "חפש" button = trigger AI search
    triggerAI();
}

function closeAnswer() {
    document.getElementById('answer-container').classList.add('hidden');
}

// ===================== RENDER ANSWER =====================
function renderAnswer(item, sources) {
    const sourcesHtml = sources && sources.length > 0
        ? `<div class="flex flex-wrap gap-2 mb-5">
            ${sources.map(s => `<a href="${s.url}" target="_blank" rel="noopener"
                class="text-xs text-sky-400 hover:text-sky-300 bg-sky-500/10 border border-sky-500/20 px-2 py-1 rounded-full truncate max-w-xs">
                🔗 ${s.title || s.url}
            </a>`).join('')}
           </div>`
        : '';

    document.getElementById('answer-content').innerHTML = `
        <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
            <span class="bg-indigo-500/20 text-indigo-300 text-xs font-bold px-3 py-1 rounded-full border border-indigo-500/20">🌐 מענה AI + חיפוש אינטרנט</span>
            <button onclick="simplifyAnswer()" class="ai-action-btn">🪄 פשט יותר</button>
        </div>
        ${sourcesHtml}
        <h2 class="text-xl font-black mb-5 text-white">${item.title}</h2>
        <div class="space-y-4 mb-6">
            ${item.steps.map((s,i) => `
                <div class="flex gap-4 items-start flex-row-reverse">
                    <span class="flex-shrink-0 w-8 h-8 bg-sky-500 text-black font-bold rounded-full flex items-center justify-center text-sm">${i+1}</span>
                    <p class="text-base text-gray-200 pt-1 leading-relaxed">${s}</p>
                </div>`).join('')}
        </div>
        ${item.tip ? `<div class="bg-amber-500/10 border border-amber-500/20 rounded-2xl p-4 mb-6 text-amber-300 text-sm">💡 <b>טיפ:</b> ${item.tip}</div>` : ''}
        <button onclick="simplifyAnswer()" class="ai-action-btn w-full justify-center py-3 mb-3">🪄 פשט — הסבר פשוט יותר למבוגר</button>
        <button onclick="openShareWa()" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 font-[\'Heebo\'] transition-all">
            💬 שלח למבוגר בוואטסאפ
        </button>
    `;

    document.getElementById('answer-container').classList.remove('hidden');
    document.getElementById('answer-container').scrollIntoView({ behavior: 'smooth' });
}

function showAILoading(msg) {
    document.getElementById('answer-container').classList.remove('hidden');
    document.getElementById('answer-content').innerHTML = `
        <div class="flex flex-col items-center py-12 gap-4">
            <div class="spinner"></div>
            <p class="text-indigo-300 font-bold text-lg">${msg || 'מחפש באינטרנט...'}</p>
            <p class="text-gray-500 text-sm">Claude מחפש ומסנתז תשובה</p>
        </div>`;
    document.getElementById('answer-container').scrollIntoView({ behavior: 'smooth' });
}

function showAIError(msg) {
    document.getElementById('answer-content').innerHTML = `
        <div class="text-center py-8 text-red-400">
            <p class="text-xl mb-2">⚠️ שגיאה</p>
            <p class="text-sm text-gray-400 mb-4">${msg}</p>
            <button onclick="closeAnswer()" class="bg-gray-700 text-white py-2 px-6 rounded-xl font-[\'Heebo\']">סגור</button>
        </div>`;
}

// ===================== GEMINI API — ישירות מהדפדפן =====================
// Gemini מאפשר קריאה ישירה בלי proxy — אין צורך ב-Cloudflare או Apps Script
const GEMINI_KEY = 'AIzaSyBJ-K-d5KtVIe-AQ-2YET3WXmn2ed2tLNM';
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`;

async function callClaudeViaProxy(systemPrompt, userMessage, imageBase64) {
    const parts = [];

    // תמונה אם קיימת
    if (imageBase64) {
        parts.push({ inlineData: { mimeType: 'image/jpeg', data: imageBase64 } });
    }
    parts.push({ text: userMessage });

    const body = {
        systemInstruction: { parts: [{ text: systemPrompt }] },
        contents: [{ role: 'user', parts }],
        tools: [{ googleSearch: {} }],
        generationConfig: {
            temperature: 0.3,
            maxOutputTokens: 1500
        }
    };

    const response = await fetch(GEMINI_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });

    if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err?.error?.message || `שגיאה ${response.status}`);
    }

    const data = await response.json();

    // חלץ טקסט מהתשובה
    const fullText = data.candidates?.[0]?.content?.parts
        ?.filter(p => p.text)
        ?.map(p => p.text)
        ?.join('') || '';

    if (!fullText) throw new Error('לא התקבלה תשובה מ-Gemini');

    // פרסור JSON
    const clean = fullText.replace(/```json/gi, '').replace(/```/g, '').trim();
    const match = clean.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('תשובה לא תקינה מ-Gemini');
    const parsed = JSON.parse(match[0]);

    // מקורות חיפוש
    const sources = (data.candidates?.[0]?.groundingMetadata?.groundingChunks || [])
        .filter(c => c.web?.uri)
        .map(c => ({ url: c.web.uri, title: c.web.title || c.web.uri }))
        .slice(0, 3);

    return { parsed, sources };
}

function buildSystemPrompt() {
    return `אתה עוזר טכני לגימלאטק — ארגון שמתנדבים בו עוזרים למבוגרים עם טכנולוגיה.
השתמש בחיפוש Google כדי למצוא את הפתרון הכי עדכני לבעיה.

מכשיר: ${state.deviceLabel} (${state.osLabel})

חוקים חשובים:
1. ענה בעברית פשוטה — בלי מונחים טכניים
2. 3 עד 5 צעדים קצרים וברורים
3. טיפ מועיל אחד בסוף
4. התשובה חייבת להיות JSON בלבד — ללא שום טקסט לפני או אחרי

פורמט חובה — JSON בלבד:
{"title":"כותרת קצרה","steps":["צעד 1","צעד 2","צעד 3"],"tip":"טיפ אחד"}`;
}

// ===================== MAIN AI TRIGGER =====================
async function triggerAI() {
    const q = document.getElementById('query-input').value.trim();
    if (!q) return;
    if (state.isLoading) return;

    state.isLoading = true;
    document.getElementById('ai-btn').disabled = true;
    document.getElementById('results-area').innerHTML = '';
    showAILoading('מחפש פתרון באינטרנט...');

    try {
        const { parsed, sources } = await callClaudeViaProxy(
            buildSystemPrompt(),
            `בעיה: ${q}`
        );
        state.currentAnswer = { ...parsed, query: q };
        renderAnswer(state.currentAnswer, sources);
    } catch (err) {
        console.error('AI Error:', err);
        const friendly = err.message?.includes('Failed to fetch')
            ? 'בעיית חיבור לשרת. ודא שיש אינטרנט ונסה שוב.'
            : `שגיאה: ${err.message}`;
        showAIError(friendly);
    } finally {
        state.isLoading = false;
        document.getElementById('ai-btn').disabled = false;
    }
}

// ===================== IMAGE UPLOAD =====================
async function handleImageUpload(event) {
    const file = event.target.files[0];
    if (!file || state.isLoading) return;

    const reader = new FileReader();
    reader.onload = async (e) => {
        const base64 = e.target.result.split(',')[1];
        state.isLoading = true;
        document.getElementById('results-area').innerHTML = '';
        showAILoading('מנתח תמונה ומחפש פתרון...');

        try {
            const { parsed, sources } = await callClaudeViaProxy(
                buildSystemPrompt() + '\nהמשתמש שלח תמונת שגיאה — נתח ותן פתרון.',
                'נתח את התמונה ותן פתרון ברור.',
                base64
            );
            state.currentAnswer = { ...parsed };
            renderAnswer(state.currentAnswer, sources);
        } catch (err) {
            showAIError(`שגיאה בניתוח התמונה: ${err.message}`);
        } finally {
            state.isLoading = false;
            event.target.value = '';
        }
    };
    reader.readAsDataURL(file);
}

// ===================== SIMPLIFY =====================
async function simplifyAnswer() {
    if (!state.currentAnswer || state.isLoading) return;
    state.isLoading = true;
    showAILoading('מפשט את ההסבר...');

    try {
        const { parsed, sources } = await callClaudeViaProxy(
            buildSystemPrompt() + '\nפשט את הפתרון — שתמש במילים כמה שיותר פשוטות, כמו שמסבירים לאדם שמעולם לא השתמש בטכנולוגיה.',
            `פשט: ${JSON.stringify(state.currentAnswer)}`
        );
        state.currentAnswer = { ...parsed };
        renderAnswer(state.currentAnswer, sources);
    } catch (err) {
        showAIError(`שגיאה בפישוט: ${err.message}`);
    } finally {
        state.isLoading = false;
    }
}

function openShareWa() {
    const a = state.currentAnswer;
    if (!a) return;
    const num = prompt("מה מספר הטלפון של המבוגר?\nלדוגמה: 0501234567\n(השאר ריק לשליחה לגימלאטק)", '');
    let phone = (num || '0505396068').replace(/[^\d]/g, '');
    if (phone.startsWith('0')) phone = '972' + phone.slice(1);
    const text = `*${a.title}*\n\n${a.steps.map((s,i) => `${i+1}. ${s}`).join('\n')}${a.tip ? `\n\n💡 טיפ: ${a.tip}` : ''}\n\n_נשלח מ-GimlaTech AI Helper_`;
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank');
}
