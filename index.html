<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GimlaTech Helper</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --text: #1e293b;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* מסגרת האפליקציה */
        .app-frame {
            width: 100%;
            max-width: 380px;
            height: 90vh;
            background: white;
            border: 10px solid #1e293b;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .header {
            background: #1e293b;
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .card {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .card:active { transform: scale(0.98); border-color: var(--primary); }
        .card-icon { font-size: 24px; background: #eff6ff; padding: 10px; border-radius: 12px; }
        .card-title { font-size: 18px; font-weight: bold; color: var(--text); }
        
        .btn-back { color: var(--primary); background: none; border: none; font-weight: bold; cursor: pointer; padding: 0; text-align: right; margin-bottom: 10px; }
        
        .footer { padding: 15px; text-align: center; font-size: 12px; color: #94a3b8; border-top: 1px solid #f1f5f9; }
        
        .hidden { display: none; }
        
        h2 { margin: 0 0 5px 0; color: var(--text); }
        p { margin: 0 0 20px 0; color: #64748b; font-size: 14px; }

        /* כפתור העלאת תמונה */
        .upload-zone {
            border: 2px dashed #cbd5e1;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            color: #64748b;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="app-frame">
    <div class="header">
        <span>GimlaTech Helper</span>
        <button onclick="location.reload()" style="background:none; border:none; color:white; cursor:pointer;">🏠</button>
    </div>

    <div class="content" id="app-content">
        <div id="step-1">
            <div class="upload-zone">📸 העלאת צילום מסך</div>
            <h2>במה אפשר לעזור?</h2>
            <p>בחרו את סוג המכשיר שבו יש תקלה:</p>
            
            <div class="card" onclick="goToStep2('pc')">
                <span class="card-icon">💻</span>
                <span class="card-title">מחשב</span>
            </div>
            <div class="card" onclick="goToStep2('phone')">
                <span class="card-icon">📱</span>
                <span class="card-title">טלפון</span>
            </div>
            <div class="card" onclick="goToStep2('extra')">
                <span class="card-icon">🖨️</span>
                <span class="card-title">ציוד היקפי</span>
            </div>
        </div>

        <div id="step-2" class="hidden">
            <button class="btn-back" onclick="goToStep1()">← חזרה</button>
            <h2 id="os-title">איזו מערכת?</h2>
            <div id="os-options"></div>
        </div>

        <div id="step-3" class="hidden">
            <button class="btn-back" onclick="goBackToStep2()">← חזרה</button>
            <h2>מה הבעיה?</h2>
            <div id="issue-options">
                <div class="card" onclick="finish()">🌐 האינטרנט לא עובד</div>
                <div class="card" onclick="finish()">🔌 המכשיר לא נדלק</div>
                <div class="card" onclick="finish()">❄️ המסך קפוא</div>
                <div class="card" onclick="finish()">⚠️ הודעת שגיאה</div>
            </div>
            <div style="margin-top: 20px;">
                <label style="font-size: 13px; font-weight: bold;">או תארו במילים שלכם:</label>
                <textarea style="width:100%; border:1px solid #ddd; border-radius:10px; margin-top:5px; padding:10px;" rows="3"></textarea>
                <button onclick="finish()" style="width:100%; background:#2563eb; color:white; border:none; padding:12px; border-radius:10px; font-weight:bold; margin-top:10px;">בקש פתרון מה-AI</button>
            </div>
        </div>
    </div>

    <div class="footer">
        © 2026 GimlaTech Helper
    </div>
</div>

<script>
    let currentDevice = '';

    const config = {
        pc: { label: 'מחשב', os: ['Windows (ווינדוס)', 'Mac (אפל)'] },
        phone: { label: 'טלפון', os: ['Android (אנדרואיד)', 'iPhone (אייפון)'] },
        extra: { label: 'ציוד היקפי', os: ['מדפסת', 'רמקולים', 'מקלדת/עכבר'] }
    };

    function goToStep2(device) {
        currentDevice = device;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
        
        const osTitle = document.getElementById('os-title');
        osTitle.innerText = `איזה ${config[device].label} יש לך?`;
        
        const osOptions = document.getElementById('os-options');
        osOptions.innerHTML = '';
        config[device].os.forEach(os => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<span class="card-title">${os}</span>`;
            div.onclick = () => goToStep3();
            osOptions.appendChild(div);
        });
    }

    function goToStep1() {
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-1').classList.remove('hidden');
    }

    function goToStep3() {
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');
    }

    function goBackToStep2() {
        document.getElementById('step-3').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    }

    function finish() {
        alert("הבקשה התקבלה! סורק פתרונות...");
        location.reload();
    }
</script>

</body>
</html>
