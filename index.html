<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GimlaTech Helper</title>
    <style>
        :root { --main: #2563eb; --dark: #1e293b; }
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #e2e8f0; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .app-shell {
            width: 360px; min-height: 700px; background: white;
            border: 10px solid var(--dark); border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; overflow: hidden;
        }

        .header { background: var(--dark); color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 18px; }
        .container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }

        .btn {
            width: 100%; padding: 16px 15px; margin-bottom: 10px;
            background: white; border: 2px solid #cbd5e1; border-radius: 15px;
            cursor: pointer; font-size: 16px; font-weight: bold; text-align: right;
            display: flex; align-items: center; transition: all 0.15s;
        }
        .btn:hover { background: #f1f5f9; border-color: var(--main); }

        .hidden { display: none !important; }
        .back-btn { color: var(--main); cursor: pointer; font-weight: bold; margin-bottom: 15px; border: none; background: none; font-size: 14px; padding: 0; }

        .tag { background: #dbeafe; color: #1e40af; font-size: 12px; padding: 4px 12px; border-radius: 20px; display: inline-block; margin-bottom: 12px; }

        .free-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 15px; padding: 15px; margin-top: 10px; }
        .free-box label { font-weight: bold; font-size: 14px; color: #475569; display: block; margin-bottom: 8px; }
        .free-box input { width: 100%; border: 1px solid #cbd5e1; border-radius: 10px; padding: 10px 12px; font-family: inherit; font-size: 15px; }
        .free-box input:focus { outline: none; border-color: var(--main); }

        .answer-card { background: #f0fdf4; border: 2px solid #86efac; border-radius: 18px; padding: 20px; margin-bottom: 15px; }
        .answer-card h3 { margin: 0 0 12px; color: #166534; font-size: 16px; }
        .step { display: flex; margin-bottom: 10px; align-items: flex-start; }
        .step-num { background: #22c55e; color: white; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; margin-left: 10px; flex-shrink: 0; margin-top: 2px; }
        .step-text { font-size: 14px; color: #14532d; line-height: 1.6; }
        .tip { background: #fef9c3; border-radius: 10px; padding: 10px 12px; font-size: 13px; color: #713f12; margin-top: 12px; }

        .generic-card { background: #eff6ff; border: 2px solid #93c5fd; border-radius: 18px; padding: 18px; margin-bottom: 15px; font-size: 14px; color: #1e3a8a; line-height: 1.7; }
        .generic-card h3 { margin: 0 0 10px; color: #1e40af; font-size: 15px; }

        .new-btn { background: #f1f5f9; border: 2px solid #cbd5e1; color: var(--dark); border-radius: 12px; padding: 13px; width: 100%; font-weight: bold; cursor: pointer; font-size: 15px; }
        .footer { padding: 12px; text-align: center; border-top: 1px solid #f1f5f9; }
        .footer span { font-size: 12px; color: #94a3b8; }

        .fade-in { animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>
<div class="app-shell">
    <div class="header">🛠️ GimlaTech Helper</div>
    <div class="container">

        <!-- מסך 1 -->
        <div id="s1">
            <h2 style="font-size:20px;text-align:center;margin-top:5px;">במה אפשר לעזור?</h2>
            <button class="btn" onclick="go2('pc')">💻&nbsp;&nbsp;מחשב</button>
            <button class="btn" onclick="go2('phone')">📱&nbsp;&nbsp;טלפון</button>
            <button class="btn" onclick="go2('extra')">🖨️&nbsp;&nbsp;ציוד היקפי</button>
        </div>

        <!-- מסך 2 -->
        <div id="s2" class="hidden">
            <button class="back-btn" onclick="show('s1')">← חזרה</button>
            <h2 id="os-title" style="font-size:18px;"></h2>
            <div id="os-list"></div>
        </div>

        <!-- מסך 3 -->
        <div id="s3" class="hidden">
            <button class="back-btn" onclick="show('s2')">← חזרה</button>
            <span class="tag" id="ctx-tag"></span>
            <h2 style="font-size:18px;margin-top:5px;">מה הבעיה?</h2>
            <div id="problem-list"></div>
            <div class="free-box">
                <label>🔍 לא מצאתם? חפשו בחופשיות:</label>
                <input type="text" id="free-input" placeholder="למשל: המסך שחור..." onkeydown="if(event.key==='Enter')freeSearch()">
                <button class="btn" style="margin-top:10px;background:#2563eb;color:white;border-color:#2563eb;" onclick="freeSearch()">חיפוש</button>
            </div>
        </div>

        <!-- מסך 4 -->
        <div id="s4" class="hidden">
            <button class="back-btn" onclick="show('s3')">← חזרה</button>
            <div id="answer-area"></div>
            <button class="new-btn" onclick="go1()">🔄 בעיה חדשה</button>
        </div>

    </div>
    <div class="footer">
        <a href="https://wa.me/972505396068" target="_blank" style="display:inline-flex;align-items:center;gap:8px;background:#25d366;color:white;text-decoration:none;padding:10px 20px;border-radius:25px;font-weight:bold;font-size:15px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.17 1.535 5.962L.057 23.944l6.107-1.598A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.894a9.886 9.886 0 01-5.031-1.378l-.361-.214-3.741.979.999-3.645-.235-.374A9.862 9.862 0 012.106 12C2.106 6.58 6.58 2.106 12 2.106c5.419 0 9.894 4.474 9.894 9.894 0 5.419-4.475 9.894-9.894 9.894z"/></svg>
            דברו איתנו בוואטסאפ
        </a>
    </div>
</div>

<script>
const categories = {
    pc:    { title:'איזה מחשב?',  types:['💻 Windows (ווינדוס)','🍎 Mac (אפל)'] },
    phone: { title:'איזה טלפון?', types:['🤖 Android (סמסונג / אחר)','📱 iPhone (אפל)'] },
    extra: { title:'איזה ציוד?',  types:['🖨️ מדפסת','🔊 רמקולים','🖱️ עכבר / מקלדת'] }
};

const answers = {
    "pc|windows|net":  { title:"💻 Windows — האינטרנט לא עובד", steps:["לחצו על סמל הרשת בפינה הימנית התחתונה ובדקו שאתם מחוברים ל-WiFi.","כבו את הנתב (המכשיר עם האנטנות) 30 שניות, הדליקו, המתינו דקה.","אם עדיין לא עובד — הפעילו מחדש את המחשב."], tip:"📞 עדיין לא עובד? צרו קשר עם ספק האינטרנט שלכם." },
    "pc|windows|power": { title:"💻 Windows — המחשב לא נדלק", steps:["ודאו שכבל החשמל מחובר היטב למחשב ולשקע.","לחצו על כפתור ההפעלה 10 שניות לכיבוי כפוי, ואז הדליקו מחדש.","אם נייד — חברו לחשמל והמתינו 10 דקות לפני שמנסים."], tip:"🔧 אם אין תגובה בכלל — פנו לטכנאי." },
    "pc|windows|freeze": { title:"💻 Windows — הכל קפוא", steps:["המתינו 2-3 דקות — לפעמים המחשב פשוט עמוס.","לחצו Ctrl + Alt + Delete יחד ← 'מנהל המשימות' ← סגרו תוכניות תקועות.","לחצו על כפתור ההפעלה 10 שניות לכיבוי כפוי, ואז הדליקו."], tip:"💡 מחשב קופא לעתים? שקלו עדכון או ניקוי קבצים." },

    "pc|mac|net":   { title:"🍎 Mac — האינטרנט לא עובד", steps:["לחצו על סמל ה-WiFi בפינה הימנית העליונה ובדקו שמחוברים.","כבו את הנתב 30 שניות, הדליקו, המתינו דקה.","לחצו על תפריט Apple ← 'הפעל מחדש'."], tip:"📞 בעיה ממשיכה? צרו קשר עם ספק האינטרנט." },
    "pc|mac|power": { title:"🍎 Mac — לא נדלק", steps:["אם נייד — חברו לחשמל, המתינו 10 דקות.","לחצו על כפתור ההפעלה 10 שניות לאיפוס.","נסו: Shift + Control + Option + Power יחד."], tip:"🔧 אין תגובה? פנו לשירות Apple." },
    "pc|mac|freeze": { title:"🍎 Mac — קפוא", steps:["המתינו מספר דקות.","לחצו Command + Option + Escape לסגירת תוכניות תקועות.","לחצו על כפתור ההפעלה 10 שניות לכיבוי כפוי."], tip:"💡 קופא לעתים? עדכנו את macOS." },

    "phone|android|net":   { title:"🤖 Android — האינטרנט לא עובד", steps:["הגדרות ← WiFi — ודאו שמחוברים לרשת הנכונה.","כבו WiFi 10 שניות ← הפעילו שוב.","אם דאטה: הגדרות ← חיבורים ← ודאו שדאטה סלולרי פעיל."], tip:"📞 בעיה רק באתר אחד? ייתכן שהבעיה באתר, לא בטלפון." },
    "phone|android|power": { title:"🤖 Android — לא נדלק", steps:["חברו לטעינה 15 דקות לפחות.","לחצו על כפתור ההפעלה 10 שניות.","נסו: כפתור הפעלה + הורדת עוצמה יחד 15 שניות."], tip:"🔋 סוללה מתרוקנת מהר? ייתכן שהיא צריכה החלפה." },
    "phone|android|freeze": { title:"🤖 Android — קפוא", steps:["לחצו כפתור הפעלה 10 שניות לכיבוי כפוי.","המתינו 10 שניות ← הדליקו.","אם קורה לעתים — מחקו אפליקציות שלא משתמשים בהן."], tip:"💡 אפליקציה מסוימת גורמת לקיפאון? הסירו ותתקינו מחדש." },

    "phone|iphone|net":   { title:"📱 iPhone — האינטרנט לא עובד", steps:["הגדרות ← WiFi — ודאו שמחוברים.","כבו WiFi 10 שניות ← הפעילו שוב.","כבו את האייפון לגמרי, הדליקו ונסו שוב."], tip:"📞 בעיית דאטה? בדקו אם הגעתם למגבלת גלישה חודשית." },
    "phone|iphone|power": { title:"📱 iPhone — לא נדלק", steps:["חברו לחשמל עם כבל מקורי 15 דקות.","הגבר עוצמה ← הנמך עוצמה ← החזיקו כפתור צד עד לוגו Apple.","אם לא עולה — פנו לחנות Apple."], tip:"🔋 מטען לא מקורי יכול לגרום לבעיות טעינה." },
    "phone|iphone|freeze": { title:"📱 iPhone — קפוא", steps:["הגבר עוצמה (מהיר) ← הנמך עוצמה (מהיר) ← החזיקו כפתור צד עד כיבוי.","המתינו 10 שניות ← הדליקו.","קורה לעתים? הגדרות ← כללי ← עדכון תוכנה."], tip:"💡 iPhone ישן שקופא הרבה? שקלו שדרוג." },

    "extra|printer|net":   { title:"🖨️ מדפסת — בעיית חיבור", steps:["ודאו שהמדפסת מחוברת לאותו WiFi כמו המחשב.","כבו את המדפסת 30 שניות ← הדליקו.","הגדרות ← מדפסות וסורקים ← מחקו והוסיפו מחדש."], tip:"📶 מדפסת קרובה לנתב עובדת טוב יותר." },
    "extra|printer|power": { title:"🖨️ מדפסת — לא נדלקת", steps:["ודאו שכבל חשמל מחובר — גם לשקע וגם למדפסת.","נסו שקע חשמל אחר.","בדקו מתג חשמל בגב המדפסת — ודאו שהוא פעיל."], tip:"🔌 חלק מהמדפסות יש מתג גם בגב." },
    "extra|printer|freeze": { title:"🖨️ מדפסת — תקועה / לא מדפיסה", steps:["כבו ← הדליקו.","בדקו נייר תקוע: פתחו מגש נייר ומשכו בעדינות.","מחשב ← מדפסות וסורקים ← ראה מה מודפס ← מחקו משימות תקועות."], tip:"🖨️ חסר דיו? תוצג הודעה על המסך." },

    "extra|speakers|net":   { title:"🔊 רמקולים — בעיית חיבור", steps:["אם Bluetooth — ודאו שפעיל במחשב/טלפון.","כבו רמקולים 10 שניות ← הדליקו ← התחברו מחדש.","אם קוויים — ודאו שהשקע בשקע הנכון (בד\"כ ירוק)."], tip:"📻 רמקולי Bluetooth לא מחוברים למכשיר אחר?" },
    "extra|speakers|power": { title:"🔊 רמקולים — לא נדלקים", steps:["ודאו שכבל חשמל מחובר, או שהסוללה טעונה.","בדקו שעוצמת הקול לא מכובה — גם ברמקולים וגם במחשב.","נסו לחבר למכשיר אחר כדי לדעת אם הבעיה ברמקולים."], tip:"🔇 עוצמה נמוכה מדי נראית כ'לא עובד'." },
    "extra|speakers|freeze": { title:"🔊 רמקולים — אין קול", steps:["לחיצה ימנית על סמל הרמקול ← הגדרות קול ← בחרו את הרמקולים הנכונים.","כבו ← הפעילו רמקולים.","הפעילו מחדש מחשב — עדכונים לפעמים מכבים קול."], tip:"🎵 בעיה בסרטון ספציפי או בכל הקולות?" },

    "extra|mouse|net":   { title:"🖱️ עכבר/מקלדת — בעיית חיבור", steps:["אלחוטיים? בדקו ← החליפו סוללות.","נתקו את המקלט (dongle) מה-USB ← חברו ביציאה אחרת.","נסו יציאת USB שונה."], tip:"🔋 עכבר/מקלדת אלחוטיים — החליפו סוללה כל כמה חודשים." },
    "extra|mouse|power": { title:"🖱️ עכבר/מקלדת — לא עובד", steps:["בדקו שהכבל מחובר היטב, או שהסוללות תקינות.","נסו יציאת USB אחרת.","נסו במחשב אחר כדי לאשר שהמכשיר עצמו תקין."], tip:"🖱️ עכבר לא נע? נסו משטח אחר — לא זכוכית." },
    "extra|mouse|freeze": { title:"🖱️ עכבר/מקלדת — קופא / מגיב לאט", steps:["נתקו 10 שניות ← חברו מחדש.","הפעילו מחדש את המחשב.","נקו את תחתית העכבר בעדינות עם בד יבש."], tip:"🧹 לכלוך תחת העכבר הוא סיבה נפוצה לתגובה איטית." }
};

let selDevice = '', selOS = '';

function show(id) {
    ['s1','s2','s3','s4'].forEach(s =>
        document.getElementById(s).classList.toggle('hidden', s !== id)
    );
}

function go1() {
    selDevice = ''; selOS = '';
    document.getElementById('free-input').value = '';
    show('s1');
}

function go2(device) {
    selDevice = device;
    const cat = categories[device];
    document.getElementById('os-title').innerText = cat.title;
    const list = document.getElementById('os-list');
    list.innerHTML = '';
    cat.types.forEach(type => {
        const b = document.createElement('button');
        b.className = 'btn';
        b.textContent = type;
        b.onclick = () => go3(type);
        list.appendChild(b);
    });
    show('s2');
}

function go3(os) {
    selOS = os;
    document.getElementById('ctx-tag').textContent = os;
    document.getElementById('free-input').value = '';
    const problems = ['🌐 האינטרנט לא עובד','🔌 המכשיר לא נדלק','❄️ הכל קפוא / תקוע'];
    const list = document.getElementById('problem-list');
    list.innerHTML = '';
    problems.forEach(p => {
        const b = document.createElement('button');
        b.className = 'btn';
        b.textContent = p;
        b.onclick = () => showAnswer(p);
        list.appendChild(b);
    });
    show('s3');
}

function getKey(os, problem) {
    let osKey = '';
    if (/windows/i.test(os))  osKey = 'windows';
    else if (/mac/i.test(os)) osKey = 'mac';
    else if (/android/i.test(os)) osKey = 'android';
    else if (/iphone/i.test(os)) osKey = 'iphone';
    else if (/מדפסת/.test(os)) osKey = 'printer';
    else if (/רמקולים/.test(os)) osKey = 'speakers';
    else if (/עכבר/.test(os)) osKey = 'mouse';

    let probKey = '';
    if (/אינטרנט|רשת|חיבור/.test(problem))   probKey = 'net';
    else if (/נדלק|כוח|חשמל/.test(problem))   probKey = 'power';
    else if (/קפוא|תקוע|מגיב/.test(problem))  probKey = 'freeze';

    const devKey = selDevice === 'extra' ? 'extra' : 'pc|phone'.includes(selDevice) ? selDevice : selDevice;
    return `${selDevice}|${osKey}|${probKey}`;
}

function showAnswer(problem) {
    const key = getKey(selOS, problem);
    const data = answers[key];
    const area = document.getElementById('answer-area');

    if (data) {
        const stepsHTML = data.steps.map((s, i) =>
            `<div class="step"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`
        ).join('');
        area.innerHTML = `<div class="answer-card fade-in"><h3>${data.title}</h3>${stepsHTML}<div class="tip">${data.tip}</div></div>`;
    } else {
        area.innerHTML = `<div class="generic-card fade-in"><h3>💡 עצה כללית</h3>הפעולה הראשונה תמיד: <strong>כבו את המכשיר, המתינו 30 שניות, הדליקו מחדש.</strong><br><br>אם לא עוזר — פנו לנציג שירות טכני.</div>`;
    }
    show('s4');
}

function freeSearch() {
    const q = document.getElementById('free-input').value.trim();
    if (!q) return;

    let matched = '';
    if (/אינטרנט|רשת|wifi|חיבור|אתר/.test(q))     matched = '🌐 האינטרנט לא עובד';
    else if (/נדלק|כוח|חשמל|לא עולה|מת/.test(q))   matched = '🔌 המכשיר לא נדלק';
    else if (/קפוא|תקוע|לא מגיב|איטי/.test(q))      matched = '❄️ הכל קפוא / תקוע';

    if (matched) {
        showAnswer(matched);
    } else {
        const area = document.getElementById('answer-area');
