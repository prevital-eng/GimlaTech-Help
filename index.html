<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GimlaTech AI Helper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Heebo',sans-serif; background:#0d121f; color:#e2e8f0; margin:0; min-height:100vh; }
        .card-btn { background:#1a2235; border:2px solid #2d3748; transition:all 0.2s; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:1.5rem; border-radius:1.25rem; width:100%; }
        .card-btn:hover { border-color:#38bdf8; transform:translateY(-3px); background:#222b42; }
        .screen { display:none; animation:fadeIn 0.3s ease-out; }
        .screen.active { display:block; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .search-input { background:#1a2235!important; color:#fff!important; border:2px solid #2d3748; outline:none; width:100%; padding:1rem 1.25rem; border-radius:1rem; font-size:1.05rem; font-family:'Heebo',sans-serif; transition:border-color 0.2s; box-sizing:border-box; }
        .search-input:focus { border-color:#38bdf8; }
        .search-input::placeholder { color:#64748b!important; }
        .btn-ai { background:#4f46e5; color:white; border:none; cursor:pointer; padding:1rem 1.5rem; border-radius:1rem; font-weight:700; font-family:'Heebo',sans-serif; font-size:1rem; transition:background 0.2s; display:flex; align-items:center; gap:0.5rem; white-space:nowrap; }
        .btn-ai:hover { background:#6366f1; }
        .btn-ai:disabled { opacity:0.5; cursor:not-allowed; }
        .btn-cam { background:#1e293b; color:#94a3b8; border:2px solid #2d3748; cursor:pointer; padding:1rem; border-radius:1rem; transition:all 0.2s; display:flex; align-items:center; justify-content:center; }
        .btn-cam:hover { border-color:#38bdf8; color:#38bdf8; }
        .spinner { width:36px; height:36px; border:3px solid rgba(99,102,241,0.3); border-top-color:#818cf8; border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .wa-float { position:fixed; bottom:20px; left:0; right:0; display:flex; justify-content:center; z-index:1000; pointer-events:none; padding:0 20px; }
        .wa-btn { background:#25d366; color:white; border:none; cursor:pointer; padding:1rem 2rem; border-radius:1rem; font-weight:800; font-family:'Heebo',sans-serif; font-size:1rem; display:flex; align-items:center; gap:0.75rem; box-shadow:0 8px 25px rgba(0,0,0,0.5); transition:all 0.2s; pointer-events:auto; max-width:480px; width:100%; }
        .wa-btn:hover { background:#1fb95a; }
        .answer-box { background:#1e293b; border:2px solid rgba(99,102,241,0.3); border-radius:1.5rem; padding:1.75rem; margin-top:1.5rem; }
        .step-row { display:flex; gap:1rem; align-items:flex-start; flex-direction:row-reverse; margin-bottom:1rem; }
        .step-num { flex-shrink:0; width:2rem; height:2rem; background:#38bdf8; color:#0d121f; font-weight:800; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.85rem; }
    </style>
</head>
<body class="pb-32">

<header class="sticky top-0 z-50 border-b border-gray-800 bg-[#0d121f]/95 backdrop-blur">
    <div class="max-w-2xl mx-auto px-5 py-5 flex justify-center items-center gap-3">
        <span class="text-2xl font-black text-white">Gimla<span class="text-sky-400">Tech</span></span>
        <span class="bg-indigo-500/10 text-indigo-400 text-xs font-bold px-2 py-1 rounded-full border border-indigo-500/20">AI Helper</span>
    </div>
</header>

<main class="max-w-2xl mx-auto w-full px-5 py-8">

    <!-- מסך 1: מכשיר -->
    <section id="screen-device" class="screen active">
        <div class="flex justify-center items-center gap-2 mb-8">
            <div class="w-8 h-8 bg-sky-500 text-black rounded-full flex items-center justify-center font-bold text-sm">1</div>
            <div class="w-12 h-1 bg-gray-700"></div>
            <div class="w-8 h-8 border-2 border-gray-700 text-gray-600 rounded-full flex items-center justify-center text-sm">2</div>
            <div class="w-12 h-1 bg-gray-700"></div>
            <div class="w-8 h-8 border-2 border-gray-700 text-gray-600 rounded-full flex items-center justify-center text-sm">3</div>
        </div>
        <h1 class="text-2xl font-extrabold mb-1 text-center text-white">במה לעזור היום?</h1>
        <p class="text-gray-400 text-center mb-8">בחר את סוג המכשיר שבו יש תקלה</p>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="selectDevice('computer','מחשב')" class="card-btn">
                <span class="text-5xl mb-3">🖥️</span>
                <span class="font-bold text-white">מחשב</span>
                <span class="text-xs text-gray-500 mt-1">PC / Laptop</span>
            </button>
            <button onclick="selectDevice('phone','טלפון')" class="card-btn">
                <span class="text-5xl mb-3">📱</span>
                <span class="font-bold text-white">טלפון חכם</span>
                <span class="text-xs text-gray-500 mt-1">Android / iPhone</span>
            </button>
            <button onclick="selectDevice('tablet','טאבלט')" class="card-btn">
                <span class="text-5xl mb-3">📟</span>
                <span class="font-bold text-white">טאבלט</span>
                <span class="text-xs text-gray-500 mt-1">iPad / Android Tab</span>
            </button>
            <button onclick="selectDevice('peripheral','ציוד היקפי')" class="card-btn">
                <span class="text-5xl mb-3">🖨️</span>
                <span class="font-bold text-white">ציוד היקפי</span>
                <span class="text-xs text-gray-500 mt-1">מדפסת / WiFi / אוזניות</span>
            </button>
        </div>
    </section>

    <!-- מסך 2: מערכת הפעלה -->
    <section id="screen-os" class="screen">
        <button onclick="goScreen('device')" class="text-sm text-gray-500 hover:text-sky-400 mb-6 block transition-colors">
            ← חזרה לבחירת מכשיר
        </button>
        <div class="flex justify-center items-center gap-2 mb-8">
            <div class="w-8 h-8 bg-sky-500 text-black rounded-full flex items-center justify-center font-bold text-sm">✓</div>
            <div class="w-12 h-1 bg-sky-500"></div>
            <div class="w-8 h-8 bg-sky-500 text-black rounded-full flex items-center justify-center font-bold text-sm">2</div>
            <div class="w-12 h-1 bg-gray-700"></div>
            <div class="w-8 h-8 border-2 border-gray-700 text-gray-600 rounded-full flex items-center justify-center text-sm">3</div>
        </div>
        <h1 class="text-2xl font-extrabold mb-1 text-center text-white">איזו מערכת הפעלה?</h1>
        <p class="text-gray-400 text-center mb-8">בחר את מערכת ההפעלה של המכשיר</p>
        <div class="grid grid-cols-2 gap-4" id="os-options"></div>
    </section>

    <!-- מסך 3: חיפוש -->
    <section id="screen-search" class="screen">
        <div class="flex items-center gap-2 mb-6 bg-gray-800/30 px-4 py-3 rounded-xl border border-gray-800 text-sm flex-wrap">
            <button onclick="goScreen('device')" class="text-gray-400 hover:text-sky-400 transition-colors">← החלף מכשיר</button>
            <span class="text-gray-700">|</span>
            <span class="text-sky-400 font-bold" id="bread-device"></span>
            <span class="text-gray-600">/</span>
            <span class="text-sky-400 font-bold" id="bread-os"></span>
            <button onclick="goScreen('os')" class="text-gray-600 hover:text-sky-400 transition-colors text-xs">(שנה)</button>
        </div>

        <div class="flex flex-col gap-3 mb-1">
            <input type="text" id="query-input"
                placeholder="תאר את הבעיה..."
                class="search-input"
                onkeydown="if(event.key==='Enter') askAI()">
            <div class="flex gap-2">
                <button onclick="askAI()" id="ai-btn" class="btn-ai flex-1">
                    🤖 שאל AI
                </button>
                <button onclick="document.getElementById('img-upload').click()" class="btn-cam" title="צלם / צרף תמונה של השגיאה">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                </button>
                <input type="file" id="img-upload" accept="image/*" capture="environment" class="hidden" onchange="handleImage(event)">
            </div>
        </div>

        <div id="answer-area"></div>
    </section>

</main>

<div class="wa-float">
    <button onclick="openWa('0505396068','')" class="wa-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
        סיוע גימלאטק — 0505396068
    </button>
</div>

<script>
const state = { device:'', deviceLabel:'', os:'', osLabel:'', answer:null, loading:false };

const OS_MAP = {
    computer:   [{id:'WIN',label:'Windows',icon:'🪟',sub:'Windows 10/11'},{id:'MAC',label:'Mac',icon:'🍎',sub:'macOS'}],
    phone:      [{id:'AND',label:'Android',icon:'🤖',sub:'Samsung, Xiaomi...'},{id:'IOS',label:'iPhone',icon:'🍎',sub:'iOS'}],
    tablet:     [{id:'AND',label:'Android',icon:'🤖',sub:'Samsung, Lenovo...'},{id:'IOS',label:'iPad',icon:'🍎',sub:'iPadOS'}],
    peripheral: [{id:'PC',label:'מחובר למחשב',icon:'🖥️',sub:'Windows'},{id:'MOB',label:'מחובר לטלפון',icon:'📱',sub:'Android / iOS'}]
};

function goScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
    window.scrollTo({top:0, behavior:'smooth'});
}

function selectDevice(id, label) {
    state.device = id;
    state.deviceLabel = label;
    document.getElementById('os-options').innerHTML = OS_MAP[id].map(o =>
        `<button onclick="selectOS('${o.id}','${o.label}')" class="card-btn">
            <span class="text-5xl mb-3">${o.icon}</span>
            <span class="font-bold text-white">${o.label}</span>
            <span class="text-xs text-gray-500 mt-1">${o.sub}</span>
        </button>`
    ).join('');
    goScreen('os');
}

function selectOS(id, label) {
    state.os = id;
    state.osLabel = label;
    document.getElementById('bread-device').textContent = state.deviceLabel;
    document.getElementById('bread-os').textContent = label;
    document.getElementById('query-input').value = '';
    document.getElementById('answer-area').innerHTML = '';
    goScreen('search');
    setTimeout(() => document.getElementById('query-input').focus(), 300);
}

// ===== מאגר מקומי (נשמר ב-localStorage) =====
function loadKB() {
    try { return JSON.parse(localStorage.getItem('gimlatech_kb') || '[]'); } catch { return []; }
}
function saveKB(kb) {
    localStorage.setItem('gimlatech_kb', JSON.stringify(kb));
}
function searchKB(q) {
    const kb = loadKB();
    const terms = q.toLowerCase().split(' ').filter(t => t.length > 1);
    return kb.find(item =>
        (item.dev === 'ALL' || item.dev === state.os) &&
        terms.some(t => (item.title + ' ' + item.kw).toLowerCase().includes(t))
    );
}
function saveToKB(answer, query) {
    const kb = loadKB();
    // לא לשמור כפילויות
    const exists = kb.find(i => i.title === answer.title);
    if (!exists) {
        kb.unshift({ ...answer, dev: state.os, kw: query, saved: Date.now() });
        if (kb.length > 100) kb.pop(); // מגבלה של 100 פריטים
        saveKB(kb);
    }
}

// ===== APPS SCRIPT PROXY =====
const PROXY_URL = 'https://script.google.com/macros/s/AKfycbygHNSwS_gYDxrzxGSwvDdbJJcRNuvrLmrhEsze7-BRZqB0ahB0sfMHgLphuy7xgK0/exec';

async function callAI(userQuestion) {
    const systemPrompt = `אתה עוזר טכני תמציתי של גימלאטק — מתנדבים שעוזרים למבוגרים.
מכשיר: ${state.deviceLabel} / ${state.osLabel}.
חוקים: עברית פשוטה, בדיוק 3 צעדים קצרים, טיפ אחד.
החזר JSON בלבד:
{"title":"כותרת קצרה","steps":["צעד 1","צעד 2","צעד 3"],"tip":"טיפ קצר"}`;

    const res = await fetch(PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
            system: systemPrompt,
            messages: [{ role:'user', content: userQuestion }]
        })
    });

    if (!res.ok) throw new Error(`שגיאת שרת ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(typeof data.error === 'string' ? data.error : JSON.stringify(data.error));
    if (data.type === 'error') throw new Error(data.error?.message || JSON.stringify(data.error));
    if (!data.content) throw new Error('תשובה ריקה: ' + JSON.stringify(data).slice(0,150));

    const rawText = (data.content || []).filter(c => c.type==='text').map(c => c.text).join('');
    if (!rawText) throw new Error('לא התקבלה תשובה');

    const match = rawText.replace(/```json/gi,'').replace(/```/g,'').trim().match(/\{[\s\S]*\}/);
    if (!match) throw new Error('פורמט תשובה שגוי');
    return JSON.parse(match[0]);
}

// ===== UI HELPERS =====
function setLoading(msg) {
    document.getElementById('answer-area').innerHTML = `
        <div class="answer-box flex flex-col items-center py-10 gap-4">
            <div class="spinner"></div>
            <p class="text-indigo-300 font-bold">${msg}</p>
        </div>`;
}

function showAnswer(parsed, isLocal, query) {
    state.answer = parsed;
    const badge = isLocal
        ? `<span class="text-xs font-bold bg-green-500/20 text-green-300 border border-green-500/20 px-3 py-1 rounded-full">📚 מהמאגר</span>`
        : `<span class="text-xs font-bold bg-indigo-500/20 text-indigo-300 border border-indigo-500/20 px-3 py-1 rounded-full">🤖 מענה AI</span>`;

    const saveBtn = isLocal ? '' : `
        <button onclick="saveCurrent('${(query||'').replace(/'/g,"\\'")}') " id="save-btn" class="flex-1 bg-sky-700 hover:bg-sky-600 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition-colors text-sm">
            💾 שמור למאגר
        </button>`;

    document.getElementById('answer-area').innerHTML = `
        <div class="answer-box">
            <div class="mb-4">${badge}</div>
            <h2 class="text-xl font-black text-white mb-4">${parsed.title}</h2>
            <div class="mb-5">
                ${parsed.steps.map((s,i)=>`
                    <div class="step-row">
                        <span class="step-num">${i+1}</span>
                        <p class="text-gray-200 leading-relaxed">${s}</p>
                    </div>`).join('')}
            </div>
            ${parsed.tip ? `<div class="bg-amber-500/10 border border-amber-500/20 rounded-xl p-4 text-amber-300 text-sm mb-5">💡 <b>טיפ:</b> ${parsed.tip}</div>` : ''}
            <div class="flex gap-2">
                <button onclick="copyAnswer()" id="copy-btn" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition-colors text-sm">
                    📋 העתק
                </button>
                ${saveBtn}
            </div>
        </div>`;
}

function saveCurrent(query) {
    saveToKB(state.answer, query);
    const btn = document.getElementById('save-btn');
    if (btn) { btn.innerHTML = '✅ נשמר!'; btn.disabled = true; }
}

function copyAnswer() {
    const a = state.answer;
    if (!a) return;
    const text = a.title + '\n\n' + a.steps.map((s,i) => (i+1) + '. ' + s).join('\n') + (a.tip ? '\n\nטיפ: ' + a.tip : '');
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = '✅ הועתק!';
        setTimeout(() => { btn.innerHTML = '📋 העתק'; }, 2000);
    });
}

function showError(msg) {
    document.getElementById('answer-area').innerHTML = `
        <div class="answer-box text-center py-8">
            <p class="text-red-400 text-lg mb-2">⚠️ שגיאה</p>
            <p class="text-gray-400 text-sm mb-5">${msg}</p>
            <button onclick="document.getElementById('answer-area').innerHTML=''" class="bg-gray-700 text-white py-2 px-6 rounded-xl text-sm">סגור</button>
        </div>`;
}

// ===== MAIN ACTIONS =====
async function askAI() {
    const q = document.getElementById('query-input').value.trim();
    if (!q) { document.getElementById('query-input').focus(); return; }
    if (state.loading) return;

    // קודם בדוק במאגר המקומי
    const local = searchKB(q);
    if (local) {
        showAnswer(local, true, q);
        return;
    }

    state.loading = true;
    document.getElementById('ai-btn').disabled = true;
    setLoading('מחפש פתרון...');

    try {
        const parsed = await callAI(q);
        showAnswer(parsed, false, q);
    } catch(err) {
        console.error(err);
        const msg = err?.message || JSON.stringify(err);
        showError(msg.includes('fetch') ? 'בעיית חיבור — ודא שיש אינטרנט ונסה שוב' : msg);
    } finally {
        state.loading = false;
        document.getElementById('ai-btn').disabled = false;
    }
}

async function handleImage(event) {
    const file = event.target.files[0];
    if (!file || state.loading) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
        const base64 = e.target.result.split(',')[1];
        state.loading = true;
        document.getElementById('ai-btn').disabled = true;
        setLoading('מנתח תמונה...');
        try {
            const parsed = await callAI('נתח את התמונה ותן פתרון למבוגר.');
            showAnswer(parsed, false, 'תמונה');
        } catch(err) {
            showError(err.message);
        } finally {
            state.loading = false;
            document.getElementById('ai-btn').disabled = false;
            event.target.value = '';
        }
    };
    reader.readAsDataURL(file);
}

function shareWa() {
    if (!state.answer) return;
    const a = state.answer;
    const num = prompt('מספר טלפון של המבוגר (לדוגמה: 0501234567)\nהשאר ריק לשליחה לגימלאטק', '');
    openWa(
        num || '0505396068',
        `*${a.title}*\n\n${a.steps.map((s,i)=>`${i+1}. ${s}`).join('\n')}${a.tip?`\n\n💡 טיפ: ${a.tip}`:''}\n\n_נשלח מ-GimlaTech AI Helper_`
    );
}

function openWa(num, text) {
    let phone = num.replace(/[^\d]/g,'');
    if (phone.startsWith('0')) phone = '972' + phone.slice(1);
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text||'היי, אני מתנדב גימלאטק')}`, '_blank');
}
</script>
</body>
